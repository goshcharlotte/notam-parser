<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <!-- note the special href for files in the Flask "static" folder -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <title>{{apt_code}} NOTAM</title>

</head>

<body>

    <div id="container">

        <div class="header">
            <h1>Airport {{ apt_code }}</h1>
            <div class="title-subheader">
                <div class="item-detail--header">NOTAM validity:</div>
                <div> {{notam_validity_from}} <b>to</b> {{notam_validity_to}}</div>
            </div>
            <div class="title-subheader">
                <div class="item-detail--header">NOTAM issue date:</div>
                <div>{{notam_issued_date}}</div>
            </div>
        </div>

        <div class="container">
            <div id="notam_carousel" class="carousel slide" data-ride="carousel">
                <div class="carousel-inner">
                    <div class="item active">
                        <div style="width:100%; height:40em;">
                            <div class="cover-slide">{{notam_len}} Notifications</div>
                        </div>
                    </div>
                    <!-- Jinja directives: page contents will go between them the_title -->
                    {% block content %}
                    {% endblock %}
                </div>
            </div>
            <!-- Left and right controls -->
            <a class="left carousel-control" href="#notam_carousel" data-slide="prev">
                <span class="glyphicon glyphicon-chevron-left"></span>
                <span class="sr-only">Previous</span>
            </a>
            <a class="right carousel-control" href="#notam_carousel" data-slide="next">
                <span class="glyphicon glyphicon-chevron-right"></span>
                <span class="sr-only">Next</span>
            </a>
        </div>
    </div>


    <div class="footer">
        <div class="disclaimer">{{notam_disclaimer}}</div>
        <div>Copyright &copy; {{year}} | AndDigital</div>
    </div>
</body>

</html>
